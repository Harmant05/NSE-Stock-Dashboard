<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Stock Exchange Analysis Dashboard</title>

    <script type="module"
        src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js">
    </script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        h1{
            margin:25px 0;
            color:#222;
        }

        .dashboard-container{
            width:95%;
            margin:auto;
            background:white;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.15);
            padding:15px;
        }

        tableau-viz{
            width:100%;
            height:900px;
        }
    </style>
</head>
<body>

    <h1>NSE Stock Exchange Analysis Dashboard</h1>

    <div class="dashboard-container">

        <tableau-viz
            id="tableauViz"
            src="https://public.tableau.com/views/NSE_Stock_Exchange_Analysis_Dashboard/StockExchangeAnalysisDashboard?:showVizHome=no"
            toolbar="bottom"
            hide-tabs>
        </tableau-viz>

    </div>

</body>
</html>
